<div class="dialog-backdrop" (click)="close.emit()">
  <div class="dialog" (click)="$event.stopPropagation()">

    <h3>Cancelar matrícula</h3>

    <p class="dialog-subtitle">
      Tem certeza que deseja cancelar a matrícula de
      <strong>{{ enrollment.pokemonNome }}</strong>?
    </p>

    <div class="warning-box">
      <p><strong>Plano:</strong> {{ enrollment.planoNome }}</p>
      <p><strong>Treinador:</strong> {{ enrollment.treinadorNome }}</p>

      <p class="warning-text">
        Esta ação alterará o status da matrícula para
        <strong>Cancelada</strong>.
      </p>
    </div>

    <div class="dialog-actions">
      <button class="btn-ghost" (click)="close.emit()">
        Voltar
      </button>

      <button
        class="btn-danger"
        [disabled]="cancelando()"
        (click)="confirmar()">

        {{ cancelando() ? 'Cancelando...' : 'Confirmar cancelamento' }}

      </button>
    </div>

  </div>
</div>
