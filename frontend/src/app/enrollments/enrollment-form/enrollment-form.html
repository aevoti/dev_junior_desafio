<form [formGroup]="form" (ngSubmit)="submit()" class="mb-4">
  <h2 class="h5">Nova Matrícula</h2>

  @if (errorMessage()) {
    <div class="alert alert-danger" role="alert">{{ errorMessage() }}</div>
  }

  <div class="mb-2">
    <label for="enrollment-pokemon" class="form-label">Pokémon</label>
    <select
      id="enrollment-pokemon"
      class="form-select"
      formControlName="pokemonId"
      [class.is-invalid]="form.controls.pokemonId.invalid && form.controls.pokemonId.touched"
    >
      <option [value]="null" disabled>Selecione um Pokémon</option>
      @for (pokemon of pokemons(); track pokemon.id) {
        <option [value]="pokemon.id">{{ pokemon.name }} (nível {{ pokemon.level }})</option>
      }
    </select>
    <div class="invalid-feedback">Selecione um Pokémon.</div>
  </div>

  <div class="mb-2">
    <label for="enrollment-plan" class="form-label">Plano de Treinamento</label>
    <select
      id="enrollment-plan"
      class="form-select"
      formControlName="trainingPlanId"
      [class.is-invalid]="form.controls.trainingPlanId.invalid && form.controls.trainingPlanId.touched"
    >
      <option [value]="null" disabled>Selecione um plano</option>
      @for (plan of trainingPlans(); track plan.id) {
        <option [value]="plan.id">{{ plan.name }} — R$ {{ plan.monthlyPrice.toFixed(2) }}</option>
      }
    </select>
    <div class="invalid-feedback">Selecione um plano.</div>
  </div>

  @if (eliteDosQuatroWarning(); as warning) {
    <div class="alert alert-warning" role="alert">{{ warning }}</div>
  }

  <button type="submit" class="btn btn-primary" [disabled]="submitting() || !!eliteDosQuatroWarning()">
    Matricular
  </button>
</form>
