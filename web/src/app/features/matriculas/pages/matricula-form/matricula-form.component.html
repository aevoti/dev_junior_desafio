<section class="card form-card">
  <h2 class="page-title">Nova Matrícula</h2>

  <p class="alert alert-error" *ngIf="erroApi" role="alert">{{ erroApi }}</p>

  <form #form="ngForm" (ngSubmit)="submeter(form)">
    <label class="field">
      Pokémon
      <select class="select" name="pokemonId" [(ngModel)]="pokemonId" required [disabled]="carregandoPokemons">
        <option [ngValue]="null" disabled>
          {{ carregandoPokemons ? 'Carregando...' : 'Selecione um Pokémon' }}
        </option>
        <option *ngFor="let pokemon of pokemons" [ngValue]="pokemon.id">
          {{ pokemon.nome }} (nível {{ pokemon.nivel }}) — {{ pokemon.treinadorNome }}
        </option>
      </select>
    </label>

    <p *ngIf="!carregandoPokemons && !pokemons.length" class="empty-state">
      Nenhum Pokémon cadastrado ainda.
    </p>

    <label class="field">
      Plano de Treinamento
      <select class="select" name="planoTreinamentoId" [(ngModel)]="planoTreinamentoId" required>
        <option [ngValue]="null" disabled>Selecione um plano</option>
        <option *ngFor="let plano of planos" [ngValue]="plano.id">
          {{ plano.nome }} - {{ plano.valorMensal | currency: 'BRL' }}
        </option>
      </select>
    </label>

    <p class="alert alert-error" *ngIf="nivelInsuficiente" role="alert">
      {{ pokemonSelecionado?.nome }} está no nível {{ pokemonSelecionado?.nivel }}, mas este plano exige nível
      mínimo {{ NIVEL_MINIMO_ELITE_DOS_4 }} (R3).
    </p>

    <label class="field">
      Data de início
      <input class="input" type="date" name="dataInicio" [(ngModel)]="dataInicio" required />
    </label>

    <button class="btn btn-primary" type="submit" [disabled]="form.invalid || nivelInsuficiente || enviando">
      {{ enviando ? 'Salvando...' : 'Matricular' }}
    </button>
  </form>
</section>
