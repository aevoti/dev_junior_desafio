<div class="modal-backdrop" (click)="fechado.emit()">
  <div class="modal-panel" (click)="$event.stopPropagation()">
    <h3 class="page-title">Transferir {{ pokemonNome }}</h3>

    <label class="field">
      Novo Treinador
      <select class="select" [(ngModel)]="novoTreinadorId" name="novoTreinadorId">
        <option [ngValue]="null" disabled>Selecione</option>
        <option *ngFor="let treinador of treinadores" [ngValue]="treinador.id">{{ treinador.nome }}</option>
      </select>
    </label>

    <p class="alert alert-error" *ngIf="erro" role="alert">{{ erro }}</p>

    <div class="modal-actions">
      <button
        class="btn btn-primary"
        type="button"
        [disabled]="!novoTreinadorId || confirmando"
        (click)="confirmar()"
      >
        {{ confirmando ? 'Transferindo...' : 'Confirmar transferência' }}
      </button>
      <button class="btn btn-ghost" type="button" (click)="fechado.emit()">Cancelar</button>
    </div>
  </div>
</div>
