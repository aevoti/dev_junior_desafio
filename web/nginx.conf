server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Encaminha chamadas de API pro container "api" do docker-compose
    # (environment.prod.ts usa um caminho relativo "/api" de propósito).
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback de SPA: qualquer rota do Angular Router (ex.: /matriculas/nova)
    # que não bata com um arquivo real cai no index.html, e o Router assume.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
